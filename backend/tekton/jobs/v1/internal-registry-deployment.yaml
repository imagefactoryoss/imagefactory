apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-factory-registry
  labels:
    app.kubernetes.io/name: image-factory-registry
    app.kubernetes.io/part-of: image-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: image-factory-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-factory-registry
        app.kubernetes.io/part-of: image-factory
    spec:
      containers:
        - name: registry
          image: docker.io/library/registry:2.8.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: REGISTRY_HTTP_ADDR
              value: :5000
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: registry-data
          hostPath:
            path: /var/lib/image-factory/registry
            type: DirectoryOrCreate
