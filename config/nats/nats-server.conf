## NATS Server Config for Image Factory (local/dev)

server_name: "image-factory-nats"

port: 4222
http: 8222

max_connections: 1024
max_payload: 1048576

ping_interval: "2m"
ping_max: 2

write_deadline: "10s"
max_control_line: 4096

# JetStream is optional. Enable if you want durable messaging.
jetstream: false

debug: false
trace: false
logtime: true
