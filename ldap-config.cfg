#################
# CLEAR v2 LDAP Test Configuration
# GLAuth LDAP server configuration for local development
# Based on actual database users and roles from CLEAR v2
#################

#################
# General configuration.
debug = true
# syslog = false
# structuredlog = true

# Enable hot-reload of configuration on changes
watchconfig = true
#################

#################
# Server configuration.
#################
# Image Factory LDAP Test Configuration
# GLAuth LDAP server configuration for local development
# Based on Image Factory project requirements
# Replace every pass value in this file with deployment-specific secrets before shipping.
#################

#################
# General configuration.
#debug = true
# syslog = false
# structuredlog = true

# Enable hot-reload of configuration on changes
#watchconfig = true
#################

#################
# Server configuration.
[ldap]
  enabled = true
  listen = "127.0.0.1:3893"

# Backend configuration.
[ldaps]
  enabled = false
  listen = "127.0.0.1:6636"
  cert = "cert.pem"
  key = "key.pem"

# Admin user and base DN
[backend]
  datastore = "config"
  baseDN = "dc=imagefactory,dc=local"

#################
# Access permissions - Based on GLAuth GitHub issue #83
[behaviors]
  # Allow search operations
  search = true
  # Allow anonymous bind for search
  anonymousbind = true
  # Allow authenticated users to search
  authenticatedbind = true

#################
# Organizational Units
[[ous]]
   name = "svcaccts"

[[ous]]
   name = "people"

#################
# Service Accounts
[[users]]
   name = "ldap_search"
   ou = "svcaccts"
   uidnumber = 6001
   primarygroup = 5601
   givenname = "LDAP"
   sn = "Search Service"
   mail = "ldap-search@imagefactory.local"
   title = "LDAP Search Service Account"
   department = "IT Infrastructure"
   disabled = false
   pass = "__SET_BEFORE_DEPLOYMENT__"
   # Grant search capabilities for LDAP operations
   [[users.capabilities]]
     action = "search"
     object = "*"
   [[users.capabilities]]
     action = "bind"
     object = "*"

