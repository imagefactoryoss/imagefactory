{{- include "image-factory.validateChartConfig" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "image-factory.fullname" . }}-secrets
  labels:
    {{- include "image-factory.labels" . | nindent 4 }}
type: Opaque
{{ $secretName := printf "%s-secrets" (include "image-factory.fullname" .) -}}
{{ $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{ $placeholder := "REPLACE_WITH_BASE64_32_BYTE_KEY" -}}
{{ $providedKey := trim (default "" .Values.app.encryptionKey) -}}
{{ $existingKey := "" -}}
{{ if and $existingSecret $existingSecret.data (hasKey $existingSecret.data "ENCRYPTION_KEY") -}}
  {{ $existingKey = b64dec (index $existingSecret.data "ENCRYPTION_KEY") -}}
{{ end -}}
{{ $effectiveEncryptionKey := $providedKey -}}
{{ if or (eq $effectiveEncryptionKey "") (eq $effectiveEncryptionKey $placeholder) -}}
  {{ if ne $existingKey "" -}}
    {{ $effectiveEncryptionKey = $existingKey -}}
  {{ else -}}
    {{ $effectiveEncryptionKey = b64enc (randAlphaNum 32) -}}
  {{ end -}}
{{ end -}}
{{- $inClusterDB := eq .Values.database.mode "incluster" -}}
{{- $dbUser := ternary .Values.postgres.username .Values.database.user $inClusterDB -}}
{{- $dbPassword := ternary .Values.postgres.password .Values.database.password $inClusterDB -}}
stringData:
  IF_AUTH_JWT_SECRET: {{ .Values.app.jwtSecret | quote }}
  IF_AUTH_LDAP_BIND_PASSWORD: {{ .Values.auth.ldap.bindPassword | quote }}
  ENCRYPTION_KEY: {{ $effectiveEncryptionKey | quote }}
  IF_DATABASE_PASSWORD: {{ $dbPassword | quote }}
  IF_DATABASE_USER: {{ $dbUser | quote }}
  IF_MINIO_ROOT_USER: {{ .Values.minio.rootUser | quote }}
  IF_MINIO_ROOT_PASSWORD: {{ .Values.minio.rootPassword | quote }}
  IF_INTERNAL_REGISTRY_GC_USERNAME: ""
  IF_INTERNAL_REGISTRY_GC_PASSWORD: ""
  IF_INTERNAL_REGISTRY_GC_BEARER_TOKEN: ""
