{{- if .Values.docs.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "image-factory.fullname" . }}-docs
  labels:
    {{- include "image-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: docs
spec:
  replicas: {{ .Values.docs.replicaCount }}
  selector:
    matchLabels:
      {{- include "image-factory.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: docs
  template:
    metadata:
      labels:
        {{- include "image-factory.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: docs
      {{- with .Values.docs.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "image-factory.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: docs
          image: "{{ .Values.docs.image.repository }}:{{ .Values.docs.image.tag }}"
          imagePullPolicy: {{ .Values.docs.image.pullPolicy }}
          args:
            - --root
            - /docs
            - --port
            - {{ .Values.docs.service.port | quote }}
          {{- with .Values.docs.extraArgs }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.docs.service.port }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.docs.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "image-factory.fullname" . }}-docs
  labels:
    {{- include "image-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: docs
spec:
  type: {{ .Values.docs.service.type }}
  selector:
    {{- include "image-factory.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: docs
  ports:
    - name: http
      port: {{ .Values.docs.service.port }}
      targetPort: http
{{- end }}
