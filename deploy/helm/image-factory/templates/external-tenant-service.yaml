{{- if and .Values.backend.enabled .Values.externalTenantService.enabled }}
{{- include "image-factory.validateChartConfig" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "image-factory.fullname" . }}-external-tenant-service
  labels:
    {{- include "image-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-tenant-service
spec:
  replicas: {{ .Values.externalTenantService.replicaCount }}
  selector:
    matchLabels:
      {{- include "image-factory.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: external-tenant-service
  template:
    metadata:
      labels:
        {{- include "image-factory.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: external-tenant-service
    spec:
      serviceAccountName: {{ include "image-factory.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: external-tenant-service
          image: "{{ .Values.externalTenantService.image.repository }}:{{ .Values.externalTenantService.image.tag }}"
          imagePullPolicy: {{ .Values.externalTenantService.image.pullPolicy }}
          command: ["/app/external-tenant-service"]
          ports:
            - name: http
              containerPort: {{ .Values.externalTenantService.port }}
          env:
            - name: PORT
              value: {{ .Values.externalTenantService.port | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "image-factory.fullname" . }}-config
            - secretRef:
                name: {{ include "image-factory.fullname" . }}-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.externalTenantService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "image-factory.fullname" . }}-external-tenant-service
  labels:
    {{- include "image-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-tenant-service
spec:
  selector:
    {{- include "image-factory.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: external-tenant-service
  ports:
    - name: http
      port: {{ .Values.externalTenantService.port }}
      targetPort: http
{{- end }}
