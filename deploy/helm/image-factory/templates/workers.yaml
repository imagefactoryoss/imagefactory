{{- if and .Values.backend.enabled .Values.workers.dispatcher.enabled }}
{{- include "image-factory.validateChartConfig" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "image-factory.fullname" . }}-dispatcher
  labels:
    {{- include "image-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: dispatcher
spec:
  replicas: {{ .Values.workers.dispatcher.replicaCount }}
  selector:
    matchLabels:
      {{- include "image-factory.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dispatcher
  template:
    metadata:
      labels:
        {{- include "image-factory.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dispatcher
    spec:
      serviceAccountName: {{ include "image-factory.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dispatcher
          image: "{{ .Values.workers.dispatcher.image.repository }}:{{ .Values.workers.dispatcher.image.tag }}"
          imagePullPolicy: {{ .Values.workers.dispatcher.image.pullPolicy }}
          command: ["/app/dispatcher"]
          args: ["--health-port", "{{ .Values.workers.dispatcher.port }}"]
          ports:
            - name: http
              containerPort: {{ .Values.workers.dispatcher.port }}
          envFrom:
            - configMapRef:
                name: {{ include "image-factory.fullname" . }}-config
            - secretRef:
                name: {{ include "image-factory.fullname" . }}-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.workers.dispatcher.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "image-factory.fullname" . }}-dispatcher
  labels:
    {{- include "image-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: dispatcher
spec:
  selector:
    {{- include "image-factory.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dispatcher
  ports:
    - name: http
      port: {{ .Values.workers.dispatcher.port }}
      targetPort: http
{{- end }}

