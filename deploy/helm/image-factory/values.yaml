nameOverride: ""
fullnameOverride: ""

imagePullSecrets:
  - name: gitlab-registry

commonLabels: {}

serviceAccount:
  create: true
  name: ""

ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  appHost: "app.imagefactory.dev"
  docsHost: "docs.imagefactory.dev"
  appAnnotations:
    nginx.ingress.kubernetes.io/app-root: "/login"
  docsAnnotations: {}
  backendPaths:
    - path: /api
      pathType: Prefix
    - path: /healthz
      pathType: Exact
    - path: /health
      pathType: Exact
    - path: /ready
      pathType: Exact
    - path: /alive
      pathType: Exact
  certManager:
    enabled: false
    clusterIssuer:
      create: false
      name: "letsencrypt-prod"
      email: ""
      server: "https://acme-v02.api.letsencrypt.org/directory"
      privateKeySecretRef: "letsencrypt-prod-account-key"
  hosts:
    - host: www.imagefactory.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: imagefactory-dev-tls
      hosts:
        - www.imagefactory.dev
        - app.imagefactory.dev
        - docs.imagefactory.dev

app:
  environment: production
  jwtSecret: "change-me-to-a-long-random-secret"
  # Optional. Leave empty to auto-generate on first install and preserve on upgrades.
  encryptionKey: ""

auth:
  ldap:
    enabled: true
    providerName: "Active Directory"
    providerType: "active_directory"
    server: "image-factory-glauth"
    port: 3893
    baseDN: "dc=imgfactory,dc=com"
    userSearchBase: "ou=people,dc=imgfactory,dc=com"
    groupSearchBase: "dc=imgfactory,dc=com"
    bindDN: "cn=ldap_search,ou=svcaccts,dc=imgfactory,dc=com"
    bindPassword: "search_password"
    useTLS: false
    startTLS: false
    allowedDomains:
      - "imgfactory.com"

build:
  tektonEnabled: true
  tektonKubeconfig: ""

database:
  # Required. One of: incluster, external
  mode: "incluster"
  host: ""
  port: 5432
  name: ""
  user: ""
  password: ""
  sslMode: "disable"
  schema: "image_factory"
  maxOpenConns: 5
  maxIdleConns: 2
  connMaxLifetime: "2m"

backend:
  enabled: true
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-backend
    tag: v0.1.0-6c42ac0-hz20260302104749
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  resources: {}
  podAnnotations: {}
  extraEnv: []

frontend:
  enabled: true
  apiBaseUrl: ""
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-frontend
    tag: v0.1.0-6c42ac0
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
  resources: {}
  podAnnotations: {}
  extraEnv: []

docs:
  enabled: true
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-docs
    tag: v0.1.0-6c42ac0
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8000
  resources: {}
  podAnnotations: {}
  extraArgs: []

migrations:
  enabled: false
  hookWeight: "0"

bootstrap:
  enabled: false
  runOnUpgrade: false
  hookWeight: "5"
  backoffLimit: 3
  seedDemoData: false
  seedRobotSREPolicyDefaults: false

dbReset:
  enabled: false
  runOnUpgrade: false
  hookWeight: "-10"
  backoffLimit: 1
  confirmation: ""
  allowPublicSchemaReset: false
  seedDemoData: false
  runValidationChecks: true

workers:
  dispatcher:
    enabled: true
    replicaCount: 1
    port: 8084
    image:
      repository: registry.gitlab.com/s4cna/image-factory/image-factory-dispatcher
      tag: v0.1.0-21057fe
      pullPolicy: IfNotPresent
    resources: {}
  notification:
    enabled: true
    replicaCount: 1
    port: 8083
    image:
      repository: registry.gitlab.com/s4cna/image-factory/image-factory-notification-worker
      tag: v0.1.0-21057fe
      pullPolicy: IfNotPresent
    resources: {}
  email:
    enabled: true
    replicaCount: 1
    port: 8081
    image:
      repository: registry.gitlab.com/s4cna/image-factory/image-factory-email-worker
      tag: v0.1.0-21057fe
      pullPolicy: IfNotPresent
    resources: {}
  internalRegistryGc:
    enabled: true
    replicaCount: 1
    port: 8085
    image:
      repository: registry.gitlab.com/s4cna/image-factory/image-factory-internal-registry-gc-worker
      tag: v0.1.0-21057fe
      pullPolicy: IfNotPresent
    resources: {}

postgres:
  enabled: true
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-postgres
    tag: "18-alpine"
    pullPolicy: IfNotPresent
  storage:
    type: "hostPath" # one of: emptyDir, pvc, hostPath
    hostPath:
      path: "/var/lib/image-factory/postgres"
      type: "DirectoryOrCreate"
  database: image_factory
  username: postgres
  password: postgres
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  resources: {}

redis:
  enabled: true
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-redis
    tag: "8-alpine"
    pullPolicy: IfNotPresent
  storage:
    type: "hostPath" # one of: emptyDir, pvc, hostPath
    hostPath:
      path: "/var/lib/image-factory/redis"
      type: "DirectoryOrCreate"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources: {}

nats:
  enabled: true
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-nats
    tag: "2.10-alpine"
    pullPolicy: IfNotPresent
  storage:
    type: "hostPath" # one of: emptyDir, pvc, hostPath
    hostPath:
      path: "/var/lib/image-factory/nats"
      type: "DirectoryOrCreate"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources: {}

minio:
  enabled: true
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-minio
    tag: latest
    pullPolicy: IfNotPresent
  rootUser: minioadmin
  rootPassword: minioadmin
  storage:
    type: "hostPath" # one of: emptyDir, pvc, hostPath
    hostPath:
      path: "/var/lib/image-factory/minio"
      type: "DirectoryOrCreate"
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
  resources: {}

registry:
  enabled: true
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-registry
    tag: "2"
    pullPolicy: IfNotPresent
  storage:
    type: "hostPath" # one of: emptyDir, pvc, hostPath
    hostPath:
      path: "/var/lib/image-factory/registry"
      type: "DirectoryOrCreate"
  persistence:
    enabled: true
    size: 100Gi
    storageClass: ""
  resources: {}

mailpit:
  enabled: true
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-mailpit
    tag: latest
    pullPolicy: IfNotPresent
  resources: {}

glauth:
  enabled: true
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-glauth
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3893
  args:
    - -c
    - /etc/glauth/glauth.cfg
  config: |
    debug = true
    watchconfig = true

    [ldap]
      enabled = true
      listen = "0.0.0.0:3893"

    [ldaps]
      enabled = false
      listen = "0.0.0.0:6636"

    [backend]
      datastore = "config"
      baseDN = "dc=imgfactory,dc=com"

    [[groups]]
      name = "svcaccts"
      gidnumber = 5501

    [[groups]]
      name = "people"
      gidnumber = 5502

    [[ous]]
      name = "svcaccts"

    [[ous]]
      name = "people"

    [[users]]
      name = "ldap_search"
      ou = "svcaccts"
      uidnumber = 6001
      primarygroup = 5501
      givenname = "LDAP"
      sn = "Search Service"
      mail = "ldap-search@imgfactory.com"
      disabled = false
      pass = "search_password"
      [[users.capabilities]]
        action = "search"
        object = "*"

    [[users]]
      name = "admin"
      ou = "people"
      uidnumber = 5001
      primarygroup = 5502
      givenname = "Image"
      sn = "Factory Admin"
      mail = "admin@imgfactory.com"
      disabled = false
      pass = "password"

    [[users]]
      name = "alice.johnson"
      ou = "people"
      uidnumber = 5002
      primarygroup = 5502
      givenname = "Alice"
      sn = "Johnson"
      mail = "alice.johnson@imgfactory.com"
      disabled = false
      pass = "password"

    [[users]]
      name = "carol.davis"
      ou = "people"
      uidnumber = 5003
      primarygroup = 5502
      givenname = "Carol"
      sn = "Davis"
      mail = "carol.davis@imgfactory.com"
      disabled = false
      pass = "password"

    [[users]]
      name = "emily.chen"
      ou = "people"
      uidnumber = 5004
      primarygroup = 5502
      givenname = "Emily"
      sn = "Chen"
      mail = "emily.chen@imgfactory.com"
      disabled = false
      pass = "password"

ollama:
  enabled: false
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-ollama
    tag: "llama3.2-3b"
    pullPolicy: IfNotPresent
  service:
    port: 11434
  storage:
    mode: "baked" # one of: baked, emptyDir, pvc, hostPath
    mountPath: "/root/.ollama"
    hostPath:
      path: "/var/lib/image-factory/ollama"
      type: "DirectoryOrCreate"
  persistence:
    enabled: false
    size: 20Gi
    storageClass: ""
  model:
    name: "llama3.2:3b"
    preloadExpected: true
  resources: {}

sre:
  logDetector:
    enabled: false
    intervalSeconds: 120
    timeoutSeconds: 15
    lookbackMinutes: 5
    maxMatches: 5
    lokiBaseUrl: ""

loki:
  enabled: false
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-loki
    tag: "3.0.0"
    pullPolicy: IfNotPresent
  podSecurityContext:
    fsGroup: 10001
  securityContext: {}
  service:
    port: 3100
  storage:
    mode: "pvc" # one of: emptyDir, pvc, hostPath
    hostPath:
      path: "/var/lib/image-factory/loki"
      type: "DirectoryOrCreate"
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  retention:
    period: "168h"
  resources: {}

alloy:
  enabled: false
  image:
    repository: registry.gitlab.com/s4cna/image-factory/image-factory-alloy
    tag: "v1.6.1"
    pullPolicy: IfNotPresent
  clusterName: "external-cluster"
  loki:
    pushUrl: ""
  resources: {}

networkPolicy:
  enabled: false
